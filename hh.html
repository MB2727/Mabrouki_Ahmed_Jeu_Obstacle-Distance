<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WarG - Death Age</title>
    <link rel="icon" href="img/dragon-solid-full.svg">
    <style>
        /* ---------- STYLES ---------- */
        body {
            min-height: 100vh;
            background-image: url("img/battle-hardened-war-city_1148042-50.jpg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .nav {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            margin-top: 1%;
            margin-bottom: 1%;
            justify-content: space-around;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 10px;
        }
        #nav_left {
            flex-grow: 1;
            cursor: pointer;
        }
        #nav_right {
            flex-grow: 1;
            font-size: 1.3em;
            font-family: Verdana, Tahoma, sans-serif;
            max-width: 200px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }
        #nav_center {
            flex-grow: 4;
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 3%;
        }
        #nav_center a {
            background-color: transparent;
            font-weight: 800;
            font-size: 2em;
            color: rgb(67, 3, 126);
            display: inline-block;
            border-radius: 20px;
            padding: 5px 20px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }
        #nav_center a:hover {
            background-color: rgba(0, 0, 0, 0.3);
        }
        #nav_right:hover {
            transform: scale(1.1);
        }

        #play > h1 {
            font-family: 'Bebas Neue', 'Anton', 'Staatliches', sans-serif;
            font-size: 10rem;
            font-weight: bold;
            font-style: oblique;
            letter-spacing: 6px;
            color: #000000;
            text-shadow: 6px 6px 0px rgba(0,0,0,0.5);
            text-align: center;
            margin-top: 50px;
        }
        #play_button, #select_button {
            transition: transform 0.5s ease-in-out;
            cursor: pointer;
        }
        #play_button:hover, #select_button:hover {
            transform: scale(1.2);
        }

        #select_player {
            display: none;
            text-align: center;
        }
        #img_players {
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            flex-wrap: wrap;
            gap: 20px;
        }
        .img_players {
            height: 300px;
            width: 150px;
            object-fit: cover;
            border-radius: 20px;
            transition: transform 0.3s ease;
            cursor: pointer;
            border: 3px solid transparent;
        }
        .img_players:hover {
            transform: scale(1.1);
            border-color: gold;
        }

        /* Zone de jeu */
        #gameArea {
            display: none;
            width: 1000px;
            margin: 20px auto;
            background: #1e2a1a;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }
        #gameHeader {
            display: flex;
            justify-content: space-between;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd966;
            background: #2c2c2c;
            padding: 10px 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-family: monospace;
        }
        #gameCanvas {
            background: #2b4423;
            border: 4px solid #7a5a3a;
            border-radius: 12px;
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }
        #gameControls {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
        }
        #gameControls button {
            background: #3a2a1f;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        #gameControls button:hover {
            background: #5e3e2a;
            transform: scale(1.05);
        }
        #gameStatus {
            text-align: center;
            font-size: 1.4rem;
            margin-top: 12px;
            color: #ffaa44;
            font-weight: bold;
        }
        hr {
            width: 45%;
            border-color: black;
        }
        @media (max-width: 1050px) {
            #gameArea { width: 95%; }
            #gameCanvas { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

<div class="nav">
    <img id="nav_left" src="img/skull-crossbones-solid-full.svg" alt="Skull" style="height: 50px;width: 50px;">
    <div id="nav_center">
        <a class="aa" href="#" id="home">Home</a>
        <a class="aa" href="#" id="info">Game Info</a>
        <a class="aa" href="#" id="news">News</a>
        <a class="aa" href="#" id="support">Support</a>
    </div>
    <div id="nav_right">
        <img id="music" src="img/music-solid-full.svg" alt="music" style="height: 40px; width: 40px;">
        <span id="music_status">OFF</span>
    </div>
</div>
<hr>

<div id="play">
    <h1>Death Age</h1>
    <button type="button" id="play_button" style="background-color: rgb(7, 173, 7); border: 7px solid beige; border-radius: 10px; height: 80px; width:250px; font-size: 2em; font-weight: bold; font-style: oblique; margin-left: 42%;">PLAY</button>
</div>

<div id="select_player">
    <br><br>
    <div id="img_players">
        <img class="img_players" src="img/khami.png" alt="iran leader">
        <img class="img_players" src="img/kais.png" alt="tunisia president">
        <img class="img_players" src="img/putin.png" alt="russia president">
        <img class="img_players" src="img/xi.png" alt="china president">
        <img class="img_players" src="img/trump.png" alt="eww">
    </div>
    <br><br>
    <button type="button" id="select_button" style="background-color: rgb(7, 173, 7); border: 7px solid beige; border-radius: 10px; height: 80px; width:275px; font-size: 1.2em; font-weight: bold; font-style: oblique; margin-left: 42%;">SELECT</button>
</div>

<!-- Zone de jeu -->
<div id="gameArea">
    <div id="gameHeader">
        <span>🔥 Score: <span id="gameScore">0</span></span>
        <span>📏 Distance: <span id="gameDistance">0</span> m</span>
    </div>
    <canvas id="gameCanvas" width="1000" height="500"></canvas>
    <div id="gameControls">
        <button id="restartBtn">🔄 Restart</button>
        <button id="menuBtn">🏠 Menu</button>
    </div>
    <div id="gameStatus"></div>
</div>

<script>
    // ---------- MUSIQUE ----------
    const mmm = new Audio("music/Drop Of A Hat - The Grey Room _ Density & Time.mp3");
    let button_play = document.getElementById("play_button");
    let divplay = document.getElementById("play");
    let currentdiv = divplay;
    let currenthome = divplay;

    button_play.addEventListener("click", () => {
        divplay.style.display = "none";
        currentdiv = document.getElementById("select_player");
        currenthome = currentdiv;
        currenthome.style.display = "block";
    });

    let info = document.getElementById("info");
    let news = document.getElementById("news");
    let support = document.getElementById("support");
    let homeLink = document.getElementById("home");

    // Gestion des onglets (info, news, support) - on écrase currentdiv mais on garde l'affichage
    info.addEventListener("click", (event) => {
        event.preventDefault();
        currentdiv.innerHTML = `<br><br><p style="font-size:45px; color:black; font-weight:bold;text-align:center;">Ce jeu est principalement le projet de developpement web c'est un jeu d'obstacles a eviter et un score obtenu a partir du nombre d'obstacles evites et la distance ou le temps passe sans echouer.</p><p style="font-size:45px; color:black; font-weight:bold;text-align:center;">L'idee est base principalement sur l'etat actuel du monde et de la guerre Iranienne. Le jeu est absolument pour s'amuser et n'a pas de cibles cachées. ENJOY THE GAME !</p>`;
    });
    news.addEventListener("click", (event) => {
        event.preventDefault();
        currentdiv.innerHTML = `<br><br><p style="font-size:35px; color:black; font-weight:bold;text-align:center;">Donald Trump a qualifié de “complètement stupide” la proposition de paix de l’Iran et a promis une “victoire complète” des États-Unis.</p><p style="font-size:35px; color:black; font-weight:bold;text-align:center;">Le gouvernement iranien a, de son côté, affirmé que le pays était prêt à “donner une leçon” en cas de nouvelle agression américaine.</p><p style="font-size:35px; color:black; font-weight:bold;text-align:center;">Le PDG d’Aramco a assuré que la guerre au Moyen-Orient avait déclenché “le plus grand choc énergétique” jamais connu.</p>`;
    });
    support.addEventListener("click", (event) => {
        event.preventDefault();
        currentdiv.innerHTML = `<br><br><p style="font-size:35px; color:black; font-weight:bold;text-align:center;">Report any problem to this email : ahmedmabrouki301@gmail.com</p>`;
    });
    homeLink.addEventListener("click", (event) => {
        event.preventDefault();
        // Revenir à l'écran d'accueil (play) sans recharger la page
        divplay.style.display = "block";
        document.getElementById("select_player").style.display = "none";
        gameArea.style.display = "none";
        currentdiv = divplay;
        // On restaure le contenu original de divplay (sinon il est écrasé)
        divplay.innerHTML = `<h1>Death Age</h1><button type="button" id="play_button" style="background-color: rgb(7, 173, 7); border: 7px solid beige; border-radius: 10px; height: 80px; width:250px; font-size: 2em; font-weight: bold; font-style: oblique; margin-left: 42%;">PLAY</button>`;
        // Réattacher l'événement au nouveau bouton PLAY
        document.getElementById("play_button").addEventListener("click", () => {
            divplay.style.display = "none";
            document.getElementById("select_player").style.display = "block";
            currentdiv = document.getElementById("select_player");
            currenthome = currentdiv;
        });
    });

    // Sélection du personnage
    let players = document.getElementsByClassName("img_players");
    let player_selected = players[0];
    for (let i = 0; i < players.length; i++) {
        players[i].addEventListener("click", () => {
            if (player_selected === players[i]) {
                players[i].style.transform = "scale(1.2)";
                document.getElementById("select_button").textContent = "Start";
            } else {
                players[i].style.transform = "scale(1.2)";
                player_selected.style.removeProperty("transform");
                player_selected = players[i];
                document.getElementById("select_button").textContent = "Start";
            }
        });
    }

    // Musique
    let music_status = document.getElementById("music_status");
    let musicImg = document.getElementById("music");
    mmm.addEventListener('error', () => {
        console.error("Fichier audio introuvable");
        music_status.textContent = "ERROR";
    });
    mmm.addEventListener('ended', () => {
        mmm.currentTime = 0;
        mmm.play();
        music_status.textContent = "ON";
    });
    musicImg.addEventListener("click", () => {
        if (music_status.textContent === "OFF") {
            mmm.play();
            music_status.textContent = "ON";
        } else {
            mmm.pause();
            music_status.textContent = "OFF";
        }
    });

    // ---------- JEU ----------
    const gameArea = document.getElementById('gameArea');
    const gameCanvas = document.getElementById('gameCanvas');
    const ctx = gameCanvas.getContext('2d');
    const gameScoreSpan = document.getElementById('gameScore');
    const gameDistanceSpan = document.getElementById('gameDistance');
    const restartBtn = document.getElementById('restartBtn');
    const menuBtn = document.getElementById('menuBtn');
    const selectBtn = document.getElementById('select_button');

    let gameRunning = false;
    let animationId = null;
    let score = 0;
    let distance = 0;
    let frame = 0;

    // Joueur (grand, déplacement horizontal)
    const player = {
        x: 150,
        y: 0,
        width: 90,
        height: 130,
        normalHeight: 130,
        yGround: 0,
        isJumping: false,
        isDucking: false,
        yVelocity: 0,
        gravity: 0.65,
        jumpPower: -20,
        duckHeight: 70,
        minX: 30,
        maxX: 400      // limite à droite pour ne pas coller aux bords
    };

    let obstacles = [];
    let bonuses = [];
    const OBSTACLE_VEHICLE = 'vehicle';
    const OBSTACLE_BOMB = 'bomb';
    const BONUS_OIL = 'oil';

    // Images préchargées
    const imagePaths = {
        vehicle: 'img/land-mine-on-solid-full.svg',
        bomb: 'img/bomb-solid-full.svg',
        oil: 'img/gas-pump-solid-full.svg',
        jet: 'img/jet-fighter-solid-full.svg'
    };
    const gameImages = {};
    function preloadImages() {
        for (let key in imagePaths) {
            const img = new Image();
            img.src = imagePaths[key];
            gameImages[key] = img;
        }
    }
    preloadImages();

    let jetX = 1000;
    let baseSpeed = 2.8;
    let currentSpeed = baseSpeed;
    let lastSpawnFrame = 0;

    // Déplacement horizontal
    let leftPressed = false;
    let rightPressed = false;

    function startGame() {
        gameRunning = true;
        score = 0;
        distance = 0;
        currentSpeed = baseSpeed;
        obstacles = [];
        bonuses = [];
        frame = 0;
        lastSpawnFrame = 0;
        jetX = gameCanvas.width;
        player.isJumping = false;
        player.isDucking = false;
        player.yVelocity = 0;
        player.height = player.normalHeight;
        player.x = 150;
        player.y = player.yGround;
        updateScoreDisplay();
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(gameLoop);
    }

    function updateScoreDisplay() {
        gameScoreSpan.textContent = Math.floor(score);
        gameDistanceSpan.textContent = Math.floor(distance);
    }

    function drawPlayer() {
        let imgSrc = player_selected ? player_selected.src : 'img/khami.png';
        let img = new Image();
        img.src = imgSrc;
        let drawY = player.y;
        let drawHeight = player.height;
        if (player.isDucking) {
            drawY = player.y + (player.normalHeight - player.duckHeight);
            drawHeight = player.duckHeight;
        }
        if (img.complete) {
            ctx.drawImage(img, player.x, drawY, player.width, drawHeight);
        } else {
            ctx.fillStyle = '#2c5e2c';
            ctx.fillRect(player.x, drawY, player.width, drawHeight);
            ctx.fillStyle = 'white';
            ctx.font = "16px monospace";
            ctx.fillText("champion", player.x+10, drawY+40);
        }
    }

    function drawObstacles() {
        for (let obs of obstacles) {
            let img = (obs.type === OBSTACLE_VEHICLE) ? gameImages.vehicle : gameImages.bomb;
            if (img.complete) ctx.drawImage(img, obs.x, obs.y, obs.width, obs.height);
            else ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        }
    }

    function drawBonuses() {
        for (let bonus of bonuses) {
            let img = gameImages.oil;
            if (img.complete) ctx.drawImage(img, bonus.x, bonus.y, bonus.width, bonus.height);
            else ctx.fillRect(bonus.x, bonus.y, bonus.width, bonus.height);
        }
    }

    function drawJet() {
        let img = gameImages.jet;
        if (!img.complete) return;
        ctx.save();
        ctx.translate(jetX + 30, 50 + 20);
        ctx.scale(-1, 1);
        ctx.drawImage(img, -30, -20, 60, 40);
        ctx.restore();
    }

    function updateGame() {
        if (!gameRunning) return;

        // Score & distance
        score += currentSpeed * 0.25;
        distance += currentSpeed * 0.12;
        updateScoreDisplay();

        // Saut
        if (player.isJumping) {
            player.yVelocity += player.gravity;
            player.y += player.yVelocity;
            if (player.y >= player.yGround) {
                player.y = player.yGround;
                player.isJumping = false;
                player.yVelocity = 0;
            }
        }

        // Accroupissement
        player.height = player.isDucking ? player.duckHeight : player.normalHeight;

        // Déplacement horizontal
        let move = 0;
        if (leftPressed && player.x > player.minX) move = -6;
        if (rightPressed && player.x < player.maxX) move = 6;
        player.x += move;

        // Déplacement des obstacles
        for (let i=0; i<obstacles.length; i++) {
            obstacles[i].x -= currentSpeed;
            if (obstacles[i].x + obstacles[i].width < 0) obstacles.splice(i--,1);
        }
        for (let i=0; i<bonuses.length; i++) {
            bonuses[i].x -= currentSpeed;
            if (bonuses[i].x + bonuses[i].width < 0) bonuses.splice(i--,1);
        }

        // Jet défilant
        jetX -= currentSpeed * 0.7;
        if (jetX + 60 < 0) jetX = gameCanvas.width + 50;

        // Spawn (tous les 75 frames)
        if (frame - lastSpawnFrame > 75) {
            lastSpawnFrame = frame;
            let r = Math.random();
            if (r < 0.4) { // véhicule
                obstacles.push({
                    x: gameCanvas.width,
                    y: player.yGround + 8,
                    width: 55,
                    height: 48,
                    type: OBSTACLE_VEHICLE
                });
            } else if (r < 0.65) { // bombe (tombe du ciel)
                obstacles.push({
                    x: gameCanvas.width,
                    y: 140,     // hauteur de chute
                    width: 32,
                    height: 32,
                    type: OBSTACLE_BOMB
                });
            } else if (r < 0.88) { // bonus pétrole
                bonuses.push({
                    x: gameCanvas.width,
                    y: player.yGround + 5,
                    width: 50,
                    height: 50,
                    type: BONUS_OIL
                });
            }
        }

        // Collisions obstacles (hitbox réduite)
        for (let obs of obstacles) {
            let pLeft = player.x + 12;
            let pRight = player.x + player.width - 12;
            let pTop = player.y + 15;
            let pBottom = player.y + player.height - 10;
            let oLeft = obs.x + 8;
            let oRight = obs.x + obs.width - 8;
            let oTop = obs.y + 8;
            let oBottom = obs.y + obs.height - 8;
            if (pRight > oLeft && pLeft < oRight && pBottom > oTop && pTop < oBottom) {
                gameOver();
                return;
            }
        }

        // Collisions bonus
        for (let i=0; i<bonuses.length; i++) {
            let b = bonuses[i];
            if (player.x < b.x + b.width && player.x + player.width > b.x &&
                player.y < b.y + b.height && player.y + player.height > b.y) {
                score += 50;
                updateScoreDisplay();
                bonuses.splice(i,1);
                i--;
            }
        }

        frame++;
    }

    function gameLoop() {
        if (!gameRunning) return;
        updateGame();
        draw();
        animationId = requestAnimationFrame(gameLoop);
    }

    function draw() {
        ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
        // Sol
        player.yGround = gameCanvas.height - 80;
        ctx.fillStyle = '#6b4c3b';
        ctx.fillRect(0, player.yGround + 35, gameCanvas.width, 15);
        ctx.fillStyle = '#a5794a';
        ctx.fillRect(0, player.yGround + 48, gameCanvas.width, 12);
        
        drawJet();
        drawObstacles();
        drawBonuses();
        drawPlayer();

        if (!gameRunning) {
            ctx.font = "bold 40px monospace";
            ctx.fillStyle = "#aa0000";
            ctx.shadowBlur = 0;
            ctx.fillText("GAME OVER", gameCanvas.width/2 - 120, gameCanvas.height/2 - 50);
            ctx.font = "24px monospace";
            ctx.fillStyle = "white";
            ctx.fillText("Cliquez sur Restart", gameCanvas.width/2 - 90, gameCanvas.height/2 + 30);
        }
    }

    function gameOver() {
        gameRunning = false;
        if (animationId) cancelAnimationFrame(animationId);
        document.getElementById('gameStatus').innerHTML = `💀 GAME OVER ! Score final : ${Math.floor(score)} 💀`;
    }

    // Touches
    function handleKeyDown(e) {
        if (!gameRunning) return;
        const code = e.code;
        if (code === 'Space' || code === 'ArrowUp') {
            e.preventDefault();
            if (!player.isJumping && !player.isDucking) {
                player.isJumping = true;
                player.yVelocity = player.jumpPower;
            }
        } else if (code === 'ArrowDown') {
            e.preventDefault();
            if (!player.isJumping) player.isDucking = true;
        } else if (code === 'ArrowLeft' || code === 'KeyA') {
            leftPressed = true;
            e.preventDefault();
        } else if (code === 'ArrowRight' || code === 'KeyD') {
            rightPressed = true;
            e.preventDefault();
        }
    }

    function handleKeyUp(e) {
        const code = e.code;
        if (code === 'ArrowDown') {
            player.isDucking = false;
            if (!player.isJumping) player.y = player.yGround;
        } else if (code === 'ArrowLeft' || code === 'KeyA') {
            leftPressed = false;
        } else if (code === 'ArrowRight' || code === 'KeyD') {
            rightPressed = false;
        }
    }

    function handleCanvasClick() {
        if (!gameRunning) return;
        if (!player.isJumping && !player.isDucking) {
            player.isJumping = true;
            player.yVelocity = player.jumpPower;
        }
    }

    // Démarrer le jeu au clic sur Start
    selectBtn.addEventListener('click', () => {
        if (player_selected) {
            document.getElementById('select_player').style.display = 'none';
            gameArea.style.display = 'block';
            player.yGround = gameCanvas.height - 80;
            player.y = player.yGround;
            startGame();
        } else {
            alert("Veuillez sélectionner un personnage !");
        }
    });

    restartBtn.addEventListener('click', () => {
        startGame();
        document.getElementById('gameStatus').innerHTML = '';
    });

    menuBtn.addEventListener('click', () => {
        gameRunning = false;
        if (animationId) cancelAnimationFrame(animationId);
        gameArea.style.display = 'none';
        document.getElementById('select_player').style.display = 'block';
        document.getElementById('gameStatus').innerHTML = '';
        player_selected = players[0]; // reset visuel optionnel
    });

    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);
    gameCanvas.addEventListener('click', handleCanvasClick);
</script>
</body>
</html>
